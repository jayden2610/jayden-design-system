<!-- @dsCard group="Type" viewport="700x250" name="Tymos (example) — Type Pairing" subtitle="Example product type: Lora (serif headings) · Nunito (sans UI/body) · DM Mono (numbers, labels)." -->
<!DOCTYPE html><html class="tymos"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font-sans);background:var(--bg);color:var(--text);padding:22px 26px}
  .stack{display:flex;flex-direction:column;gap:16px}
  .item{display:flex;flex-direction:column;gap:3px}
  .tag{font-family:var(--font-mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
  .serif{font-family:var(--font-serif);font-size:30px;font-weight:600;color:var(--text);line-height:1.15}
  .serif em{font-style:italic;color:var(--accent)}
  .sans{font-family:var(--font-sans);font-size:15px;font-weight:500;color:var(--text-2);line-height:1.5;max-width:520px}
  .mono{font-family:var(--font-mono);font-size:13px;color:var(--text);letter-spacing:.02em}
  .eyebrow{font-family:var(--font-mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent-2)}
  .divider{height:1px;background:var(--border-2)}
</style></head><body>
<div class="stack">
  <div class="item">
    <span class="tag">Lora · display / headings</span>
    <span class="serif">Focus that <em>burns</em> for a reason.</span>
  </div>
  <div class="divider"></div>
  <div class="item">
    <span class="tag">Nunito · body / UI</span>
    <span class="sans">A Pomodoro timer that treats your attention like a finite resource — and makes you feel it.</span>
  </div>
  <div class="divider"></div>
  <div class="item">
    <span class="tag">DM Mono · numbers · eyebrows · labels</span>
    <span class="mono">25:00 &nbsp; · &nbsp; 92m focus &nbsp; · &nbsp; 4 sessions</span>
    <span class="eyebrow">What is Tymos?</span>
  </div>
</div>
</body></html>
