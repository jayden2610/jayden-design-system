<!-- @dsCard group="Type" viewport="700x200" name="Mono — JetBrains Mono" subtitle="Eyebrows, labels, metrics — uppercase, wide tracking" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font-mono);background:oklch(13% 0.01 255);color:oklch(94% 0.004 255);padding:26px 28px}
  .eyebrow{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:oklch(72% 0.17 160)}
  .label{font-size:13px;letter-spacing:.04em;margin-top:16px;color:oklch(94% 0.004 255)}
  .metrics{display:flex;gap:28px;margin-top:18px}
  .metric .n{font-size:30px;font-weight:600;letter-spacing:-0.01em}
  .metric .l{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:oklch(60% 0.008 255);margin-top:4px}
</style></head><body>
  <div class="eyebrow">// trend · variant · live</div>
  <div class="label">connect → select → build → self-correct</div>
  <div class="metrics">
    <div class="metric"><div class="n">28</div><div class="l">token sets</div></div>
    <div class="metric"><div class="n">9</div><div class="l">trends</div></div>
    <div class="metric"><div class="n">4.5:1</div><div class="l">min contrast</div></div>
  </div>
</body></html>
