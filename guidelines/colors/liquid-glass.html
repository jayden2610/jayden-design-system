<!-- @dsCard group="Colors" viewport="700x302" name="Liquid Glass" subtitle="Glassmorphism / Vision Pro material — warm, cool & rose scenes" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font-sans);background:oklch(96% 0.004 90);padding:18px 20px;color:oklch(20% 0.01 90)}
  .row{display:flex;align-items:center;gap:18px;padding:10px 14px;border-radius:12px;margin-bottom:8px;border:1px solid oklch(88% 0.006 90)}
  .row:last-child{margin-bottom:0}
  .vname{font-family:var(--font-mono);font-size:11px;font-weight:500;width:150px;flex:none;display:flex;flex-direction:column;gap:3px;line-height:1.3}
  .vcls{opacity:.5;font-size:10px}
  .chips{display:flex;gap:14px;flex-wrap:wrap}
  .chip{display:flex;flex-direction:column;align-items:center;gap:5px}
  .sw{width:40px;height:40px;border-radius:9px;border:1px solid rgba(0,0,0,.12);box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .cap{font-family:var(--font-mono);font-size:9px;letter-spacing:.04em;opacity:.65}
</style></head><body>
<div class="row liquid-glass-a">
      <div class="vname">Morning Gold<span class="vcls">.liquid-glass-a</span></div>
      <div class="chips"><div class="chip"><span class="sw" style="background:var(--bg-fallback)"></span><span class="cap">bg</span></div><div class="chip"><span class="sw" style="background:var(--accent)"></span><span class="cap">accent</span></div><div class="chip"><span class="sw" style="background:var(--accent-pale)"></span><span class="cap">pale</span></div><div class="chip"><span class="sw" style="background:var(--accent-deep)"></span><span class="cap">deep</span></div><div class="chip"><span class="sw" style="background:var(--text)"></span><span class="cap">text</span></div><div class="chip"><span class="sw" style="background:var(--muted)"></span><span class="cap">muted</span></div></div>
    </div><div class="row liquid-glass-b">
      <div class="vname">Midnight Indigo<span class="vcls">.liquid-glass-b</span></div>
      <div class="chips"><div class="chip"><span class="sw" style="background:var(--bg-fallback)"></span><span class="cap">bg</span></div><div class="chip"><span class="sw" style="background:var(--accent)"></span><span class="cap">accent</span></div><div class="chip"><span class="sw" style="background:var(--accent-pale)"></span><span class="cap">pale</span></div><div class="chip"><span class="sw" style="background:var(--accent-deep)"></span><span class="cap">deep</span></div><div class="chip"><span class="sw" style="background:var(--text)"></span><span class="cap">text</span></div><div class="chip"><span class="sw" style="background:var(--muted)"></span><span class="cap">muted</span></div></div>
    </div><div class="row liquid-glass-c">
      <div class="vname">Rose Dusk<span class="vcls">.liquid-glass-c</span></div>
      <div class="chips"><div class="chip"><span class="sw" style="background:var(--bg-fallback)"></span><span class="cap">bg</span></div><div class="chip"><span class="sw" style="background:var(--accent)"></span><span class="cap">accent</span></div><div class="chip"><span class="sw" style="background:var(--accent-pale)"></span><span class="cap">pale</span></div><div class="chip"><span class="sw" style="background:var(--accent-deep)"></span><span class="cap">deep</span></div><div class="chip"><span class="sw" style="background:var(--text)"></span><span class="cap">text</span></div><div class="chip"><span class="sw" style="background:var(--muted)"></span><span class="cap">muted</span></div></div>
    </div>
</body></html>
