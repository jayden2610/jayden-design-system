<!-- @dsCard group="Colors" viewport="700x200" name="Tymos (example) — Palette" subtitle="Example product palette: warm cream surfaces, one roasted-brown accent, muted earth semantics." -->
<!DOCTYPE html><html class="tymos"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font-sans);background:var(--bg);color:var(--text);padding:20px 24px}
  .grid{display:flex;flex-direction:column;gap:14px}
  .lab{font-family:var(--font-mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
  .row{display:flex;gap:8px;flex-wrap:wrap}
  .sw{display:flex;flex-direction:column;gap:5px}
  .chip{width:74px;height:42px;border-radius:8px;border:1px solid var(--border-2)}
  .nm{font-family:var(--font-mono);font-size:9px;color:var(--text-2);letter-spacing:.02em}
  .hex{font-family:var(--font-mono);font-size:8px;color:var(--muted)}
</style></head><body>
<div class="grid">
  <div>
    <div class="lab">Surfaces &amp; accent</div>
    <div class="row">
      <div class="sw"><div class="chip" style="background:var(--bg)"></div><span class="nm">bg</span><span class="hex">#f0e9dc</span></div>
      <div class="sw"><div class="chip" style="background:var(--surface)"></div><span class="nm">surface</span><span class="hex">#ece4d5</span></div>
      <div class="sw"><div class="chip" style="background:var(--surface-3)"></div><span class="nm">surface-3</span><span class="hex">#d9cdb8</span></div>
      <div class="sw"><div class="chip" style="background:var(--accent)"></div><span class="nm">accent</span><span class="hex">#7c5c3a</span></div>
      <div class="sw"><div class="chip" style="background:var(--accent-2)"></div><span class="nm">accent-2</span><span class="hex">#a07850</span></div>
      <div class="sw"><div class="chip" style="background:var(--accent-3)"></div><span class="nm">accent-3</span><span class="hex">#c9a87a</span></div>
      <div class="sw"><div class="chip" style="background:var(--text)"></div><span class="nm">text</span><span class="hex">#2e1f0d</span></div>
    </div>
  </div>
  <div>
    <div class="lab">Semantic — muted earth tones</div>
    <div class="row">
      <div class="sw"><div class="chip" style="background:var(--red)"></div><span class="nm">red</span><span class="hex">#b84f3a</span></div>
      <div class="sw"><div class="chip" style="background:var(--yellow)"></div><span class="nm">yellow</span><span class="hex">#b8903a</span></div>
      <div class="sw"><div class="chip" style="background:var(--green)"></div><span class="nm">green</span><span class="hex">#4a8c5c</span></div>
      <div class="sw"><div class="chip" style="background:var(--blue)"></div><span class="nm">blue</span><span class="hex">#3a6b8c</span></div>
    </div>
  </div>
</div>
</body></html>
