<!-- @dsCard group="Brand" viewport="700x230" name="Tymos (example) — The Candle" subtitle="Example product motif: time spent is wax gone. Flame flickers; goes blue at rest/break." -->
<!DOCTYPE html><html class="tymos"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font-sans);background:var(--bg);color:var(--text);padding:18px 26px;display:flex;align-items:center;gap:36px}
  .logo{font-family:var(--font-serif);font-size:26px;font-weight:500;color:var(--accent);letter-spacing:.02em}
  .logo-tag{font-family:var(--font-mono);font-weight:400;opacity:.45;font-size:12px;letter-spacing:.1em;text-transform:uppercase}
  .row{display:flex;align-items:flex-end;gap:22px}
  .col{display:flex;flex-direction:column;align-items:center;gap:7px}
  .cl{font-family:var(--font-mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
  .flame{animation:cF 1.9s ease-in-out infinite}
  @keyframes cF{0%,100%{opacity:1}28%{opacity:.72}60%{opacity:.85}}
  .copy{font-family:var(--font-serif);font-style:italic;font-size:15px;color:var(--text-2);line-height:1.5;max-width:230px}
  .copy em{color:var(--accent);font-style:italic}
</style></head><body>
  <div style="display:flex;flex-direction:column;gap:14px">
    <div class="logo">Tymos <span style="color:var(--border-2);margin:0 4px;font-weight:300">·</span><span class="logo-tag">Pomodoro Timer</span></div>
    <div class="copy">Every session burns the candle shorter. <em>Time spent is wax gone.</em></div>
  </div>
  <div class="row">
    <div class="col">
      <svg width="32" height="92" viewBox="0 0 32 92"><line x1="16" y1="18" x2="16" y2="24" stroke="#2e1f0d" stroke-width="1.5" stroke-linecap="round"/><g class="flame"><path d="M16 7 C13 12 11 17 16 20 C21 17 19 12 16 7Z" fill="#e8a840"/><path d="M16 11 C14.5 15 15 18 16 19.5 C17 18 17.5 15 16 11Z" fill="#f5d080"/><ellipse cx="16" cy="19.5" rx="3" ry="1.2" fill="rgba(255,220,100,0.4)"/></g><rect x="7" y="24" width="18" height="62" rx="4" fill="#ece4d5" stroke="rgba(120,95,65,0.25)"/><rect x="10" y="26" width="5" height="58" rx="2" fill="rgba(255,255,255,0.28)"/></svg>
      <span class="cl">Day 1</span>
    </div>
    <div class="col">
      <svg width="32" height="92" viewBox="0 0 32 92"><line x1="16" y1="40" x2="16" y2="46" stroke="#2e1f0d" stroke-width="1.5" stroke-linecap="round"/><g class="flame" style="animation-delay:.3s"><path d="M16 29 C13 34 11 39 16 42 C21 39 19 34 16 29Z" fill="#e8a840"/><path d="M16 33 C14.5 37 15 40 16 41.5 C17 40 17.5 37 16 33Z" fill="#f5d080"/><ellipse cx="16" cy="41.5" rx="3" ry="1.2" fill="rgba(255,220,100,0.4)"/></g><rect x="7" y="46" width="18" height="40" rx="4" fill="#ece4d5" stroke="rgba(120,95,65,0.25)"/><rect x="10" y="48" width="5" height="36" rx="2" fill="rgba(255,255,255,0.28)"/></svg>
      <span class="cl">Day 7</span>
    </div>
    <div class="col">
      <svg width="32" height="92" viewBox="0 0 32 92"><line x1="16" y1="64" x2="16" y2="70" stroke="#2e1f0d" stroke-width="1.5" stroke-linecap="round"/><g class="flame" style="animation-delay:.6s"><path d="M16 53 C13 58 11 63 16 66 C21 63 19 58 16 53Z" fill="#2a6080"/><path d="M16 57 C14.5 61 15 64 16 65.5 C17 64 17.5 61 16 57Z" fill="#5a8ca0"/><ellipse cx="16" cy="65.5" rx="3" ry="1.2" fill="rgba(168,208,224,0.45)"/></g><rect x="7" y="70" width="18" height="16" rx="4" fill="#ece4d5" stroke="rgba(120,95,65,0.25)"/><rect x="10" y="72" width="5" height="12" rx="2" fill="rgba(255,255,255,0.28)"/></svg>
      <span class="cl">Day 21 · break</span>
    </div>
  </div>
</body></html>
