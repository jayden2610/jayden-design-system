<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing Scale" subtitle="--space-1 → --space-8 (4 → 64px), 4px base" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font-mono);background:oklch(98% 0.003 90);color:oklch(20% 0.006 90);padding:22px 26px}
  .row{display:flex;align-items:flex-end;gap:14px}
  .col{display:flex;flex-direction:column;align-items:center;gap:8px}
  .bar{background:oklch(52% 0.22 255);border-radius:3px;width:26px}
  .tok{font-size:9px;color:oklch(55% 0.01 90)}
  .px{font-size:11px;font-weight:600}
</style></head><body>
  <div class="row">
    <div class="col"><div class="bar" style="height:var(--space-1)"></div><div class="px">4</div><div class="tok">1</div></div>
    <div class="col"><div class="bar" style="height:var(--space-2)"></div><div class="px">8</div><div class="tok">2</div></div>
    <div class="col"><div class="bar" style="height:var(--space-3)"></div><div class="px">12</div><div class="tok">3</div></div>
    <div class="col"><div class="bar" style="height:var(--space-4)"></div><div class="px">16</div><div class="tok">4</div></div>
    <div class="col"><div class="bar" style="height:var(--space-5)"></div><div class="px">24</div><div class="tok">5</div></div>
    <div class="col"><div class="bar" style="height:var(--space-6)"></div><div class="px">32</div><div class="tok">6</div></div>
    <div class="col"><div class="bar" style="height:var(--space-7)"></div><div class="px">48</div><div class="tok">7</div></div>
    <div class="col"><div class="bar" style="height:var(--space-8)"></div><div class="px">64</div><div class="tok">8</div></div>
  </div>
</body></html>
